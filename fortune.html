<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 디자이너 별자리 — 디자인 놀이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;700&family=Song+Myung&family=Jua&family=Do+Hyeon&family=Black+Han+Sans&family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Nanum+Brush+Script&family=Gamja+Flower&family=Hi+Melody&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     타이포그래피 시스템 — docs/design-guide.md 1장 (2026-07-15)
     10단계 스케일(크기/행간): 40/48 · 36/44 · 32/40 · 28/36 · 24/32 · 20/28 · 18/26 · 16/26 · 14/20 · 12/16
     px 하드코딩 금지. 반응형은 아래 :root 한 곳에서만 처리.
     ⚠️ 행간이 px라 상속되면 자식이 엉뚱한 값을 물려받는다 → 크기·행간은 항상 쌍으로 적용.
     ※ 다른 영역(뉴스·톡톡) 전환 시 이 :root 블록을 assets/dinol.css로 승격.
     ============================================================ */
  :root{
    /* 프리미티브: 스케일 단계 (크기/행간 쌍 · 의미 없음) */
    --step-40-fs:40px; --step-40-lh:48px;
    --step-36-fs:36px; --step-36-lh:44px;
    --step-32-fs:32px; --step-32-lh:40px;
    --step-28-fs:28px; --step-28-lh:36px;
    --step-24-fs:24px; --step-24-lh:32px;
    --step-20-fs:20px; --step-20-lh:28px;
    --step-18-fs:18px; --step-18-lh:26px;
    --step-16-fs:16px; --step-16-lh:26px;
    --step-14-fs:14px; --step-14-lh:20px;
    --step-12-fs:12px; --step-12-lh:16px;

    /* 시맨틱: 역할 → 단계 */
    --fs-display:var(--step-40-fs); --lh-display:var(--step-40-lh);
    --fs-h1:var(--step-32-fs);      --lh-h1:var(--step-32-lh);
    --fs-h2:var(--step-24-fs);      --lh-h2:var(--step-24-lh);
    --fs-h3:var(--step-20-fs);      --lh-h3:var(--step-20-lh);
    --fs-title:var(--step-18-fs);   --lh-title:var(--step-18-lh);
    --fs-body:var(--step-16-fs);    --lh-body:var(--step-16-lh);
    --fs-body-sm:var(--step-14-fs); --lh-body-sm:var(--step-14-lh);
    --fs-caption:var(--step-12-fs); --lh-caption:var(--step-12-lh);

    /* ── 컴포넌트 시스템 (design-guide 2장) ── */
    --size-xs:28px; --size-s:32px; --size-m:40px; --size-l:48px; --size-xl:56px;
    --touch-min:44px;
    --icon-s:16px; --icon-m:20px; --icon-l:24px; --icon-xl:32px;
    --space-1:4px;  --space-2:8px;  --space-3:12px; --space-4:16px;
    --space-5:20px; --space-6:24px; --space-8:32px; --space-10:40px; --space-12:48px;
    --radius-s:4px; --radius-m:8px; --radius-l:12px; --radius-xl:16px; --radius-full:999px;
    --border-thin:1px; --border-strong:2px;

    /* ══ 컬러: 프리미티브 (이 페이지에서 소비되는 것만 · 전역 팔레트는 design-guide 4-2) ══ */
    --neutral-0:#ffffff;
    --neutral-100:#cfcfda;
    --neutral-300:#b0b0bc;
    --neutral-350:#a9adbe;
    --neutral-400:#999999;
    --neutral-500:#8a8a99;
    --neutral-700:#3a3a48;
    --neutral-750:#33333f;
    --neutral-800:#2c2c3a;
    --neutral-825:#2a2a32;
    --neutral-850:#26262f;
    --neutral-875:#23232e;
    --neutral-880:#222230;
    --neutral-925:#191922;
    --neutral-960:#13131d;
    --neutral-975:#111119;
    --neutral-985:#0e0e16;
    --neutral-1000:#0d0d12;
    --orange-300:#ffb072;
    --orange-400:#ff9e6e;
    --orange-500:#ff7f3e;

    /* ══ 컬러: 시맨틱 (컴포넌트는 이것만 참조) ══ */
    --color-bg-base:var(--neutral-1000);
    --color-bg-sunken:var(--neutral-985);
    --color-bg-surface:var(--neutral-975);
    --color-bg-elevated:var(--neutral-960);
    --color-bg-raised:var(--neutral-925);
    --color-bg-secondary:var(--neutral-875);
    --color-bg-hover:var(--neutral-800);
    --color-bg-track:var(--neutral-850);
    --color-bg-disabled:var(--neutral-825);

    --color-text-primary:var(--neutral-0);
    --color-text-body:var(--neutral-100);
    --color-text-secondary:var(--neutral-300);
    --color-text-tertiary:var(--neutral-350);
    --color-text-meta:var(--neutral-400);
    --color-text-muted:var(--neutral-500);
    --color-text-accent:var(--orange-500);
    --color-text-accent-soft:var(--orange-400);

    --color-border-subtle:var(--neutral-880);
    --color-border-default:var(--neutral-750);
    --color-border-strong:var(--neutral-700);
    --color-border-focus:var(--orange-500);
    --color-accent-grad-from:var(--orange-300);
    --color-accent-grad-to:var(--orange-500);
  }
  /* 모바일(≤580px): 제목류만 한 칸 내림. 본문류는 PC·MO 동일 */
  @media (max-width:580px){
    :root{
      --fs-display:var(--step-36-fs); --lh-display:var(--step-36-lh);
      --fs-h1:var(--step-28-fs);      --lh-h1:var(--step-28-lh);
      --fs-h2:var(--step-20-fs);      --lh-h2:var(--step-20-lh);
      --fs-h3:var(--step-18-fs);      --lh-h3:var(--step-18-lh);
    }
  }

  * { box-sizing:border-box; margin:0; padding:0; }
  html { scrollbar-gutter:stable; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
    background:var(--color-bg-base); color:var(--color-text-body); padding:var(--space-12) var(--space-6) var(--space-12); min-height:100vh; -webkit-font-smoothing:antialiased;
    font-size:var(--fs-body); line-height:var(--lh-body); }

  /* ── 헤더 ── */
  header { display:flex; flex-direction:column; align-items:center; gap:var(--space-2); margin-bottom:var(--space-12); }
  .site-title { font-family:'Cormorant Garamond','Noto Serif KR',Georgia,serif;
    font-size:var(--fs-title); line-height:var(--lh-title); font-weight:300; color:var(--color-text-tertiary); letter-spacing:5px; }
  .corner-name { font-size:var(--fs-display); line-height:var(--lh-display); font-weight:700; letter-spacing:-1.5px; color:var(--color-text-primary); margin-top:var(--space-2); text-align:center; }
  .corner-name .edition { display:block; font-size:var(--fs-h3); line-height:var(--lh-h3); font-weight:400; letter-spacing:1px; color:var(--color-text-accent); margin-top:var(--space-2); }

  /* ── 메인 그리드: 3열 × 4행 ── */
  .zodiac-grid { max-width:880px; margin:0 auto; display:grid; grid-template-columns:repeat(3,1fr); gap:var(--space-4); }
  @media (max-width:820px){ .zodiac-grid{ grid-template-columns:repeat(2,1fr); gap:var(--space-3); } }
  @media (max-width:480px){ .zodiac-grid{ grid-template-columns:repeat(2,1fr); gap:var(--space-3); } }

  /* ── 카드 ── */
  .z-card { position:relative; background:var(--color-bg-surface); border:var(--border-thin) solid var(--color-border-subtle); border-radius:var(--radius-xl);
    padding:var(--space-4); cursor:pointer; transition:transform .18s ease,border-color .18s ease,background .18s ease;
    display:flex; flex-direction:row; align-items:center; gap:var(--space-3); overflow:hidden; }
  .z-card:hover { transform:translateY(-3px); border-color:var(--color-border-strong); background:var(--color-bg-raised); }
  .z-card:focus-visible { outline:var(--border-strong) solid var(--color-border-focus); outline-offset:var(--space-1); }
  /* 별자리 이미지 자리 — 원형 더미 (페이지 고유값 · 이미지 추가 예정) */
  .z-illust { flex:0 0 64px; width:64px; height:64px; border-radius:var(--radius-full);
    background:var(--color-bg-disabled); overflow:hidden; }
  .z-illust img { width:100%; height:100%; object-fit:cover; display:block; }
  .z-body { flex:1 1 auto; min-width:0; display:flex; flex-direction:column; justify-content:center; gap:var(--space-1); }
  .z-name { font-size:var(--fs-h3); line-height:var(--lh-h3); font-weight:700; color:var(--color-text-primary); letter-spacing:-.3px; }
  .z-en { font-size:var(--fs-caption); line-height:var(--lh-caption); font-weight:500; color:var(--color-text-muted); letter-spacing:1.5px; text-transform:uppercase; }
  .z-date { font-size:var(--fs-body-sm); line-height:var(--lh-body-sm); font-weight:400; color:var(--color-text-meta); margin-top:var(--space-1); font-variant-numeric:tabular-nums; }
  /* 모바일: 2열 유지 위해 세로 스택 (가로 배치는 텍스트 폭이 부족) */
  @media (max-width:580px){
    .z-card{ flex-direction:column; align-items:center; text-align:center; gap:var(--space-2); padding:var(--space-4) var(--space-2); }
    .z-illust{ flex:0 0 auto; width:56px; height:56px; }
    .z-body{ align-items:center; width:100%; }
  }

  /* ── 팝업(드로어) ── */
  .ov { position:fixed; inset:0; background:rgba(0,0,0,.66); backdrop-filter:blur(3px); display:none; z-index:50; }
  .ov.open { display:block; }
  .drawer { position:fixed; z-index:51; top:50%; left:50%; transform:translate(-50%,-46%) scale(.98); width:min(560px,92vw); max-height:90vh;
    overflow-y:auto; background:var(--color-bg-elevated); border:var(--border-thin) solid var(--color-border-subtle); border-radius:var(--radius-xl); padding:var(--space-6); opacity:0; pointer-events:none;
    transition:opacity .2s ease,transform .2s ease; box-shadow:0 30px 80px rgba(0,0,0,.6); }
  .drawer.open { opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1); }
  .drawer::-webkit-scrollbar { width:6px; }
  .drawer::-webkit-scrollbar-track { background:transparent; }
  .drawer::-webkit-scrollbar-thumb { background:var(--color-border-default); border-radius:var(--radius-full); }
  .drawer { scrollbar-width:thin; scrollbar-color:var(--color-border-default) transparent; }
  @media (max-width:580px){ .drawer{ top:auto; bottom:0; left:0; transform:translateY(100%); width:100%; max-height:90vh; border-radius:var(--radius-xl) var(--radius-xl) 0 0; padding:var(--space-5) var(--space-4) calc(var(--space-6) + env(safe-area-inset-bottom,0px)); } .drawer.open{ transform:translateY(0); } }
  .d-close { position:absolute; top:var(--space-3); right:var(--space-3); width:var(--size-m); height:var(--size-m);
    border:none; border-radius:var(--radius-m); background:var(--color-bg-secondary); color:var(--color-text-secondary);
    font-size:var(--fs-title); line-height:1; cursor:pointer; z-index:2; display:grid; place-items:center; }
  /* 터치 타깃 최소 44px 확보 (외형 40px 유지) */
  .d-close::after{ content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:var(--touch-min); height:var(--touch-min); }
  .d-close:hover{ background:var(--color-bg-hover); color:var(--color-text-primary); }
  .d-close:focus-visible{ outline:var(--border-strong) solid var(--color-border-focus); outline-offset:var(--space-1); }

  .d-head { text-align:center; margin-bottom:var(--space-6); }
  .d-symbox { width:88px; height:88px; margin:0 auto; border-radius:var(--radius-l); background:var(--color-bg-disabled); overflow:hidden; display:grid; place-items:center;
    font-size:var(--fs-h1); line-height:1; color:var(--color-text-body); }
  .d-symbox img { width:100%; height:100%; object-fit:cover; display:block; }
  .d-title { font-size:var(--fs-h1); line-height:var(--lh-h1); font-weight:700; color:var(--color-text-primary); margin-top:var(--space-3); letter-spacing:-.5px; }
  .d-en { font-size:var(--fs-caption); line-height:var(--lh-caption); font-weight:500; color:var(--color-text-muted); letter-spacing:2px; text-transform:uppercase; margin-top:var(--space-1); }
  .d-date { font-size:var(--fs-body-sm); line-height:var(--lh-body-sm); font-weight:400; color:var(--color-text-meta); margin-top:var(--space-1); font-variant-numeric:tabular-nums; }
  

  @media (max-width:580px){ .d-symbox{ width:80px; height:80px; } }
  .d-msg { font-size:var(--fs-body); line-height:var(--lh-body); font-weight:400; color:var(--color-text-body); text-align:center; }

  .d-block { margin-top:var(--space-8); }
  /* 섹션 라벨: 크기를 키우지 않고 body/600 + 포인트 컬러로 위계 */
  .d-block-label { font-size:var(--fs-body); line-height:var(--lh-body); font-weight:600; color:var(--color-text-accent); margin-bottom:var(--space-4); display:flex; align-items:center; gap:var(--space-2); }

  /* 오늘의 확률 — 2단 구성: [항목명 … 확률·상태] / [설명] / [게이지] */
  .prob { margin-bottom:var(--space-6); }
  .prob-head { display:flex; align-items:baseline; justify-content:space-between; gap:var(--space-3); }
  .prob-name { font-size:var(--fs-body-sm); line-height:var(--lh-body-sm); font-weight:600; color:var(--color-text-body);
    display:flex; align-items:center; gap:var(--space-1); white-space:nowrap; }
  .prob-right { white-space:nowrap; flex:0 0 auto; }
  .prob-right .pct { font-size:var(--fs-body); line-height:var(--lh-body); font-weight:700; color:var(--color-text-primary); font-variant-numeric:tabular-nums; }
  .prob-right .sep { color:var(--color-text-muted); margin:0 var(--space-1); }
  .prob-right .st { font-size:var(--fs-body-sm); font-weight:600; color:var(--color-text-accent-soft); }
  .prob-quip { font-size:var(--fs-body-sm); line-height:var(--lh-body-sm); font-weight:400; color:var(--color-text-tertiary); margin-top:var(--space-1); }
  .prob-bar { height:8px; /* 게이지 두께 = 로컬 값 */ background:var(--color-bg-track); border-radius:var(--radius-full);
    overflow:hidden; margin-top:var(--space-3); }
  .prob-fill { height:100%; background:linear-gradient(90deg,var(--color-accent-grad-from),var(--color-accent-grad-to)); border-radius:var(--radius-full); }

  /* 오늘의 기운 */
  .aura { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-2); }
  .aura-item { background:var(--color-bg-raised); border:var(--border-thin) solid var(--color-border-subtle); border-radius:var(--radius-l); padding:var(--space-4); display:flex; align-items:center; gap:var(--space-3); min-width:0; }
  .aura-ico { flex:0 0 auto; width:var(--size-s); height:var(--size-s); border-radius:var(--radius-m); display:grid; place-items:center; background:var(--color-bg-secondary); font-size:var(--fs-title); line-height:1; }
  .aura-meta { min-width:0; }
  .aura-label { font-size:var(--fs-body-sm); line-height:var(--lh-body-sm); font-weight:600; color:var(--color-text-body); }
  .aura-value { font-size:var(--fs-body); line-height:var(--lh-body); font-weight:600; color:var(--color-text-primary); margin-top:var(--space-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .aura-hex { font-size:var(--fs-caption); line-height:var(--lh-caption); font-weight:400; color:var(--color-text-muted); margin-top:var(--space-1); font-variant-numeric:tabular-nums; }
  @media (max-width:580px){ .aura{ grid-template-columns:1fr; } }

  /* 오늘의 궁합 */
  .rel-wrap { background:var(--color-bg-sunken); border:var(--border-thin) solid var(--color-border-subtle); border-radius:var(--radius-l); padding:var(--space-3) var(--space-2) var(--space-2); }
  .rel svg { width:100%; height:auto; display:block; }
  .rel-summary { text-align:center; font-size:var(--fs-body-sm); line-height:var(--lh-body-sm); font-weight:400; color:var(--color-text-tertiary); margin:var(--space-3) 0 0; }
  .rel-summary b { font-weight:600; } .rel-summary .good{ color:var(--color-text-accent-soft); } .rel-summary .warn{ color:var(--color-text-muted); }
  .legend { margin-top:var(--space-4); display:grid; grid-template-columns:1fr 1fr; gap:var(--space-2) var(--space-3); }
  .legend-item { display:flex; align-items:baseline; gap:var(--space-1); font-size:var(--fs-caption); line-height:var(--lh-caption); font-weight:400; color:var(--color-text-muted); }
  .legend-item b { color:var(--color-text-body); font-weight:600; white-space:nowrap; }
  @media (max-width:580px){ .legend{ grid-template-columns:1fr; } }
</style>
</head>
<body>
<header>
  <div class="site-title">디 자 인  놀 이 터</div>
  <h1 class="corner-name">오늘의 별자리<span class="edition">- 디자이너편 -</span></h1>

function stateOf(label,pct){ const b=Math.max(0,Math.min(4,Math.floor(pct/20))); return (STATE[label]||['','','','',''])[b]; }

const TYPE_W = {'찰떡형':5,'영감형':4,'안정형':4,'성장형':3,'변수형':2,'긴장형':1};
const LEGEND = [['찰떡형','말이 잘 통하고 속도가 붙음'],['영감형','아이디어를 자극함'],['안정형','편하게 협업'],['성장형','피드백은 세지만 도움'],['변수형','수정·변경 변동 큼'],['긴장형','조심, 그러나 영향 큼']];

function renderGrid(){
  const g=document.getElementById('grid'); g.innerHTML='';
  FORTUNE.signs.forEach((s,i)=>{
    const meta = SIGN_META[s.sign] || {en:'', date:''};
    const c=document.createElement('div'); c.className='z-card'; c.tabIndex=0; c.setAttribute('role','button');
    c.setAttribute('aria-label', s.nameKo + ' 운세 보기');
    c.innerHTML=`<div class="z-illust"></div>
      <div class="z-body">
        <div class="z-name">${s.nameKo}</div>
        <div class="z-en">${meta.en}</div>
        <div class="z-date">${meta.date}</div>
      </div>`;
    const open=()=>openDrawer(i);
    c.addEventListener('click',open);
    c.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(); }});
    g.appendChild(c);
  });
}

function relSVG(s){
  const d=s.designer, color=d.luckyColor.hex;
  const cx=160, cy=152, R=104;
  const ang=[-90,-30,30,90,150,210];
  const w=d.matches.map(m=>TYPE_W[m.matchType]||3);
  const maxW=Math.max(...w); const topIdx=w.indexOf(maxW);
  let lines='', nodes='';
  d.matches.forEach((m,i)=>{
    const a=ang[i]*Math.PI/180, nx=cx+R*Math.cos(a), ny=cy+R*Math.sin(a);
    const isTop=(i===topIdx), sw=(1.2+w[i]*0.7).toFixed(1), op=(0.28+w[i]*0.12).toFixed(2);
    const lc=isTop?color:CV('--color-border-strong');
    lines+=`<line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${lc}" stroke-width="${sw}" opacity="${op}" stroke-linecap="round"/>`;
    const lx=cx+(nx-cx)*0.56, ly=cy+(ny-cy)*0.56, tw=m.matchType.length*10+10;
    lines+=`<rect x="${(lx-tw/2).toFixed(1)}" y="${(ly-9).toFixed(1)}" width="${tw}" height="18" rx="9" fill="${CV('--color-bg-sunken')}"/>`;
    lines+=`<text x="${lx.toFixed(1)}" y="${(ly+3.5).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="600" fill="${isTop?color:CV('--color-text-tertiary')}">${m.matchType}</text>`;
    const below=ny>cy+2, lyName=below?ny+21:ny-15;
    nodes+=`<text x="${nx.toFixed(1)}" y="${(ny+7).toFixed(1)}" text-anchor="middle" font-size="20">${m.emoji}</text>`;
    nodes+=`<text x="${nx.toFixed(1)}" y="${lyName.toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="500" fill="${CV('--color-text-body')}">${m.name}</text>`;
  });
  const center=`<circle cx="${cx}" cy="${cy}" r="25" fill="${CV('--color-bg-raised')}" stroke="${color}" stroke-width="1.5"/>
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="20" fill="${color}">${s.symbol}</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="9" fill="${CV('--color-text-muted')}">나</text>`;
  return `<svg viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg">${lines}${center}${nodes}</svg>`;
}

        </div>
        <div class="aura-item">
          <span class="aura-ico" style="background:${color}"></span>
          <span class="aura-meta">
            <span class="aura-label">오늘의 컬러</span>
            <div class="aura-value">${d.luckyColor.name}</div>
            <div class="aura-hex">${color}</div>
          </span>
        </div>
      </div>
    </div>

    <!-- 7. 오늘의 궁합 -->
    <div class="d-block">
      <div class="d-block-label">🤝 오늘의 궁합</div>
      <div class="rel-wrap"><div class="rel">${relSVG(s)}</div></div>
      <div class="rel-summary">오늘 최고 궁합 <b class="good">${best}</b> · 주의 <b class="warn">${worst}</b></div>
      <div class="legend">${legend}</div>
    </div>`;
  dr.querySelector('.d-close').addEventListener('click',closeDrawer);
  document.getElementById('ov').classList.add('open'); dr.classList.add('open'); dr.scrollTop=0;
}
function closeDrawer(){ document.getElementById('ov').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
document.getElementById('ov').addEventListener('click',closeDrawer);
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });

fetch('fortune.json').then(r=>r.ok?r.json():Promise.reject()).then(d=>{FORTUNE=d;renderGrid();}).catch(()=>renderGrid());
</script>
</body>
