let FORTUNE = EMBEDDED;

/* 확률 상태명 사다리(양극) — pct 0-20/21-40/41-60/61-80/81-100 */
const STATE = {
  '칼퇴 운':           ['야근 확정ㅠㅠ','야근 스멀','눈치 게임','칼퇴 가능','칼퇴 확정🎉'],
  '아이디어 운':        ['막막함','실마리','감 잡힘','술술','번뜩임✨'],
  '초안 통과 운':       ['재정비','삐끗','무난','컨펌 근접','직행 컨펌🚀'],
  '수정 굴레 피할 운':  ['무한 수정🌀','수정 러시','왕복 예감','소폭 방어','완벽 방어🛡'],
  '디자인 칭찬 운':     ['묻힘','소소한 반응','은근 관심','눈에 띔','극찬 세례👏']
};
function stateOf(label,pct){ const b=Math.max(0,Math.min(4,Math.floor(pct/20))); return (STATE[label]||['','','','',''])[b]; }

/* 관계 타입 → 강도(선 굵기·최고/주의 판정). 별점 대체 */
const TYPE_W = {'찰떡형':5,'영감형':4,'안정형':4,'성장형':3,'변수형':2,'긴장형':1};
const LEGEND = [['찰떡형','말이 잘 통하고 속도가 붙음'],['영감형','아이디어를 자극함'],['안정형','편하게 협업'],['성장형','피드백은 세지만 도움'],['변수형','수정·변경 변동 큼'],['긴장형','조심, 그러나 영향 큼']];

function renderGrid(){
  const g=document.getElementById('grid'); g.innerHTML='';
  FORTUNE.signs.forEach((s,i)=>{
    const c=document.createElement('div'); c.className='z-card'; c.tabIndex=0; c.setAttribute('role','button');
    c.innerHTML=`<div class="z-top"><div class="z-sym">${s.symbol}</div><div class="z-name">${s.nameKo}</div></div>
      <div class="z-msg">${s.message}</div>
      <span class="z-cta">디자이너 운세 <span class="arw">→</span></span>`;
    const open=()=>openDrawer(i);
    c.addEventListener('click',open);
    c.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(); }});
    g.appendChild(c);
  });
}

function relSVG(s){
  const d=s.designer, color=d.luckyColor.hex;
  const cx=160, cy=152, R=104;
  const ang=[-90,-30,30,90,150,210];
  const w=d.matches.map(m=>TYPE_W[m.matchType]||3);
  const maxW=Math.max(...w); const topIdx=w.indexOf(maxW);
  let lines='', nodes='';
  d.matches.forEach((m,i)=>{
    const a=ang[i]*Math.PI/180, nx=cx+R*Math.cos(a), ny=cy+R*Math.sin(a);
    const isTop=(i===topIdx), sw=(1.2+w[i]*0.7).toFixed(1), op=(0.28+w[i]*0.12).toFixed(2);
    const lc=isTop?color:'#454559';
    lines+=`<line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${lc}" stroke-width="${sw}" opacity="${op}" stroke-linecap="round"/>`;
    const lx=cx+(nx-cx)*0.56, ly=cy+(ny-cy)*0.56, tw=m.matchType.length*10+10;
    lines+=`<rect x="${(lx-tw/2).toFixed(1)}" y="${(ly-9).toFixed(1)}" width="${tw}" height="18" rx="9" fill="#0e0e16"/>`;
    lines+=`<text x="${lx.toFixed(1)}" y="${(ly+3.5).toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="600" fill="${isTop?color:'#a2a2b6'}">${m.matchType}</text>`;
    const below=ny>cy+2, lyName=below?ny+21:ny-15;
    nodes+=`<text x="${nx.toFixed(1)}" y="${(ny+7).toFixed(1)}" text-anchor="middle" font-size="20">${m.emoji}</text>`;
    nodes+=`<text x="${nx.toFixed(1)}" y="${lyName.toFixed(1)}" text-anchor="middle" font-size="10.5" font-weight="500" fill="#c4c4d4">${m.name}</text>`;
  });
  const center=`<circle cx="${cx}" cy="${cy}" r="25" fill="#181824" stroke="${color}" stroke-width="1.5"/>
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="20" fill="${color}">${s.symbol}</text>
    <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="9" fill="#8a8a9e">나</text>`;
  return `<svg viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg">${lines}${center}${nodes}</svg>`;
}

function openDrawer(i){
  const s=FORTUNE.signs[i], d=s.designer, color=d.luckyColor.hex, font=d.luckyFont;
  const probs=d.probs.map(p=>`
    <div class="prob">
      <span class="prob-name"><span class="pi">${p.icon}</span>${p.label}</span>
      <span class="prob-bar"><span class="prob-fill" style="width:${p.pct}%"></span></span>
      <span class="prob-right"><span class="pct">${p.pct}%</span><span class="st">${stateOf(p.label,p.pct)}</span></span>
      <span class="prob-quip">${p.quip}</span>
    </div>`).join('');
  const w=d.matches.map(m=>TYPE_W[m.matchType]||3);
  const best=d.matches[w.indexOf(Math.max(...w))].name, worst=d.matches[w.indexOf(Math.min(...w))].name;
  const legend=LEGEND.map(l=>`<div class="legend-item"><b>${l[0]}</b> ${l[1]}</div>`).join('');
  const dr=document.getElementById('drawer');
  dr.innerHTML=`
    <button class="d-close" aria-label="닫기">×</button>
    <div class="d-head">
      <div class="d-sym" style="color:${color}">${s.symbol}</div>
      <div class="d-title" style="font-family:'${font}',sans-serif; color:${color}">${s.nameKo}</div>
      <div class="d-chips">
        <span class="chip"><span class="aa" style="font-family:'${font}',sans-serif; color:${color}">Aa</span><span class="clabel">오늘의 폰트</span><span class="cval">${font}</span></span>
        <span class="chip"><span class="dot" style="background:${color}"></span><span class="clabel">오늘의 색</span><span class="cval">${d.luckyColor.name}</span><span class="hex">${color}</span></span>
      </div>
    </div>
    <div class="d-msg">${s.message}</div>

    <div class="d-block">
      <div class="d-block-label">📊 오늘의 확률</div>${probs}
    </div>

    <div class="d-block">
      <div class="d-block-label">🤝 오늘의 궁합</div>
      <div class="rel-wrap"><div class="rel">${relSVG(s)}</div></div>
      <div class="rel-summary">오늘 최고 궁합 <b class="good">${best}</b> · 주의 <b class="warn">${worst}</b></div>
      <div class="legend">${legend}</div>
    </div>`;
  dr.querySelector('.d-close').addEventListener('click',closeDrawer);
  document.getElementById('ov').classList.add('open'); dr.classList.add('open'); dr.scrollTop=0;
}
function closeDrawer(){ document.getElementById('ov').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
document.getElementById('ov').addEventListener('click',closeDrawer);
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });

fetch('fortune.json').then(r=>r.ok?r.json():Promise.reject()).then(d=>{FORTUNE=d;renderGrid();}).catch(()=>renderGrid());
