<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>디자인 놀이터 — AI & Design News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&family=Cormorant+Garamond:wght@300&family=Noto+Serif+KR:wght@300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scrollbar-gutter: stable; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: #0d0d12;
    color: #e8e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .box { display: flex; flex-direction: column; align-items: center; gap: 10px; visibility: hidden; }
  .site-title {
    font-family: 'Cormorant Garamond', 'Noto Serif KR', Georgia, serif;
    font-weight: 300;
    font-size: 18px;
    color: #aaaaaa;
    letter-spacing: 5px;
    line-height: 1;
    text-align: center;
  }
  .msg { font-size: 14px; color: #999; letter-spacing: 0.2px; margin-top: 4px; line-height: 1.6; text-align: center; }
  .warn-icon { width: 46px; height: 46px; color: #ff7f3e; margin-top: 4px; }
  .retry-btn {
    width: 240px;
    max-width: 100%;
    min-height: 48px;
    margin-top: 18px;
    padding: 0 16px;
    background: #c9ccd4;
    color: #191919;
    border: none;
    border-radius: 24px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: background .15s;
  }
  .retry-btn:hover { background: #d9dce4; }
</style>
<script>
(async function () {
  // "20260702" → "Dinol_news_20260702.html"
  function briefingUrl(d) { return 'news/' + d.slice(0,4) + '/' + d.slice(4,6) + '/Dinol_news_' + d + '.html'; }

  let settled = false;  // 이동 또는 폴백 UI 중 하나로 이미 처리됐는지

  // 폴백 UI 노출 (DOM 준비 여부와 무관하게 안전하게 동작)
  function showFallback(message) {
    if (settled) return;
    settled = true;
    const render = () => {
      const box = document.querySelector('.box');
      const msg = document.getElementById('msg');
      if (box) box.style.visibility = 'visible';   // 실패 시에만 화면 노출
      if (msg) msg.innerHTML = message;
    };
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', render);
    } else {
      render();
    }
  }

  // 안전장치: 3초 안에 이동이 일어나지 않으면 수동 안내로 전환
  // (로컬 file:// 환경에서 fetch가 차단돼 멈추는 경우 등)
  const failTimer = setTimeout(() => {
    showFallback('디자인 놀이터 AI & Design News를 여는 데 문제가 있어요.<br>다시 시도해 주세요.');
  }, 3000);

  let target = null;
  let loadedOk = false;   // index.json을 정상적으로 읽어 배열로 파싱했는지
  try {
    // fetch 자체가 응답 없이 매달리는 경우까지 대비해 2.5초 후 중단
    const controller = new AbortController();
    const abortTimer = setTimeout(() => controller.abort(), 2500);
    const res = await fetch('index.json', { cache: 'no-cache', signal: controller.signal });
    clearTimeout(abortTimer);
    if (res.ok) {
      const data = await res.json();
      if (Array.isArray(data)) {
        loadedOk = true;
        const dates = data
          .filter(d => typeof d === 'string' && /^\d{8}$/.test(d))
          .sort();                      // 오름차순 정렬 후
        if (dates.length) target = dates[dates.length - 1];  // 가장 최신 날짜
      }
    }
  } catch (e) {
    console.error('[디자인놀이터] index.json을 불러오지 못했습니다.', e);
  }

  if (target && !settled) {
    clearTimeout(failTimer);
    settled = true;
    // 최신 브리핑으로 즉시 이동 (뒤로가기 시 이 페이지가 히스토리에 남지 않도록 replace)
    location.replace(briefingUrl(target));
  } else if (loadedOk) {
    // 목록을 정상적으로 읽었으나 비어 있는 경우
    clearTimeout(failTimer);
    showFallback('등록된 브리핑이 없습니다.');
  } else {
    // 로드/파싱 실패 (예: 로컬 file:// 환경에서 fetch 차단)
    clearTimeout(failTimer);
    showFallback('디자인 놀이터 AI & Design News를 여는 데 문제가 있어요.<br>다시 시도해 주세요.');
  }
})();
</script>
</head>
<body>
  <div class="box">
    <div class="site-title">디자인 놀이터</div>
    <svg class="warn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <div class="msg" id="msg"></div>
    <button class="retry-btn" id="retryBtn" onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
